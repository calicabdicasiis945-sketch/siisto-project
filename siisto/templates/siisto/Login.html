<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siisto Tracker - Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0c0e] text-white font-sans min-h-screen flex flex-col justify-center items-center p-6">

    <div class="w-full max-w-md bg-[#14161a] border border-gray-900 p-8 rounded-3xl shadow-xl space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-black text-white tracking-wide">WELCOME BACK</h1>
            <p class="text-xs text-gray-500 font-medium uppercase tracking-widest mt-1">Log in to track your progress</p>
        </div>

        {% if messages %}
        <div class="space-y-2">
            {% for message in messages %}
            <div class="p-3.5 rounded-xl text-xs font-bold border bg-red-500/10 text-red-400 border-red-500/20 text-center shadow-lg">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs text-gray-400 font-semibold mb-1.5 pl-1">Username</label>
                <input type="text" name="username" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-500 transition" placeholder="Enter your username">
            </div>
            <div>
                <label class="block text-xs text-gray-400 font-semibold mb-1.5 pl-1">Password</label>
                <input type="password" name="password" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-lime-500 transition" placeholder="Enter your password">
            </div>

            <button type="submit" class="w-full bg-lime-500 hover:bg-lime-600 text-black font-black py-3 rounded-xl transition duration-200 text-sm mt-2 shadow-lg shadow-lime-500/10">
                LOG IN
            </button>
        </form>

        <p class="text-xs text-gray-500 text-center">
            Don't have an account? <a href="{% url 'signup' %}" class="text-lime-400 hover:underline font-bold">Sign Up</a>
        </p>
    </div>

</body>
</html>
