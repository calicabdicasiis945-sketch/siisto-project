<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siisto - Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0c0e] text-white font-sans min-h-screen flex flex-col justify-center p-6">

    <div class="w-full max-w-md mx-auto space-y-8">
        
        <div class="text-center">
            <h1 class="text-4xl font-black text-lime-400 tracking-wider">SIISTO</h1>
            <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mt-2">Welcome Back</p>
        </div>

        <div class="bg-[#14161a] border border-gray-900 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-lime-500/5 rounded-full blur-3xl"></div>
            
            <h2 class="text-sm font-black text-gray-400 uppercase tracking-wider mb-6 text-center">Log In to Your Account</h2>

            {% if messages %}
                {% for message in messages %}
                <div class="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl text-xs text-center font-medium mb-4">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-wider pl-1">Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required
                        class="w-full bg-[#0b0c0e] border border-gray-800 rounded-xl px-4 py-3 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-lime-500 transition">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-wider pl-1">Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required
                        class="w-full bg-[#0b0c0e] border border-gray-800 rounded-xl px-4 py-3 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-lime-500 transition">
                </div>

                <button type="submit" 
                    class="w-full bg-lime-500 hover:bg-lime-600 text-black text-xs font-black py-3.5 rounded-xl transition uppercase tracking-wider mt-2 shadow-lg shadow-lime-500/10">
                    Log In
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-500 font-medium">
            Don't have an account? 
            <a href="{% url 'signup' %}" class="text-lime-400 font-black hover:underline ml-1">Sign Up</a>
        </p>

    </div>

</body>
</html>
